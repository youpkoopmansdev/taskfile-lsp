name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-lsp:
    name: Build LSP (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            binary: taskfile-lsp
            archive: taskfile-lsp-linux-x86_64.tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            binary: taskfile-lsp
            archive: taskfile-lsp-linux-aarch64.tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            binary: taskfile-lsp
            archive: taskfile-lsp-macos-x86_64.tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            binary: taskfile-lsp
            archive: taskfile-lsp-macos-aarch64.tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            binary: taskfile-lsp.exe
            archive: taskfile-lsp-windows-x86_64.zip

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build
        working-directory: lsp-server
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cd lsp-server/target/${{ matrix.target }}/release
          tar czf ${{ github.workspace }}/${{ matrix.archive }} ${{ matrix.binary }}

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          cd lsp-server/target/${{ matrix.target }}/release
          Compress-Archive -Path ${{ matrix.binary }} -DestinationPath ${{ github.workspace }}/${{ matrix.archive }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}

  build-vscode:
    name: Package VS Code Extension
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        working-directory: vscode-extension
        run: npm ci
      - name: Compile
        working-directory: vscode-extension
        run: npm run compile
      - name: Package VSIX
        working-directory: vscode-extension
        run: npx @vscode/vsce package --no-dependencies
      - uses: actions/upload-artifact@v4
        with:
          name: vscode-extension
          path: vscode-extension/*.vsix

  build-jetbrains:
    name: Package JetBrains Plugin
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Build plugin
        working-directory: jetbrains-plugin
        run: ./gradlew buildPlugin
      - uses: actions/upload-artifact@v4
        with:
          name: jetbrains-plugin
          path: jetbrains-plugin/build/distributions/*.zip

  release:
    name: Create Release
    needs: [build-lsp, build-vscode, build-jetbrains]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/taskfile-lsp-*.tar.gz
            artifacts/taskfile-lsp-*.zip
            artifacts/*.vsix
            artifacts/*.zip
